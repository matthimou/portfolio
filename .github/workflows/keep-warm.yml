name: Keep Auth API Warm

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Apps Script
        run: |
          curl -s "${{ secrets.AUTH_API_URL }}" > /dev/null
          echo "Pinged at $(date)"
